<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ae20",
                        "background-light": "#f6f8f6",
                        "background-dark": "#112112",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="relative flex h-auto min-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden max-w-md mx-auto shadow-2xl min-h-screen">
<!-- Header -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between">
<div class="w-10 flex justify-start">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">
                    family_history
                </span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Rootline</h2>
<div class="w-10"></div>
</div>
<!-- Hero Section -->
<div class="@container">
<div class="@[480px]:px-4 @[480px]:py-3 p-4">
<div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden bg-slate-200 dark:bg-slate-800 rounded-xl min-h-[400px] relative shadow-lg" data-alt="Uma foto calorosa de uma família multigeracional sorrindo reunida" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuA4Vej_j4FhPEPpdPv_USkiKG3sUL8RKaZil3lBQMM_ZfHwf-XR0yBsNBWG-ZTz9WLURmlbaA1beU4X9mJPW5TmL-0v3qCIWXyEt6YHi9leptzeoYRIKBMf7OwIkIQ5Ec61XDTsAiWAWvos6y5Sa2F14LK_0DAq3tWP5W_rYxx4YmVqGOoEqTC38YQ3xaRgo1Y2xCDAOVB3g3MK2C3_2iCf_ph4R51eUH4PgqbCRJXyDpGe8U-wgoal9d5Gzs6SqBwbO7NigWPNaio");'>
<!-- Gradient Overlay for depth -->
<div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent"></div>
</div>
</div>
</div>
<!-- Content Section -->
<div class="flex flex-col flex-grow px-6 pt-6 pb-12">
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-[32px] font-extrabold leading-tight text-center pb-3">
                Preserve o legado da sua família
            </h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-medium leading-relaxed pb-6 text-center">
                Organize memórias de gerações com IA e crie um arquivo vivo para o futuro.
            </p>
<!-- Pagination Dots -->
<div class="flex w-full flex-row items-center justify-center gap-2.5 py-4">
<div class="h-2 w-6 rounded-full bg-primary"></div>
<div class="h-2 w-2 rounded-full bg-primary/20 dark:bg-primary/40"></div>
<div class="h-2 w-2 rounded-full bg-primary/20 dark:bg-primary/40"></div>
</div>
<!-- Actions -->
<div class="flex flex-col w-full gap-4 mt-auto">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
                    Começar agora
                    <span class="material-symbols-outlined text-[20px]">
                        arrow_forward
                    </span>
</button>
<button class="w-full py-3 text-slate-600 dark:text-slate-400 font-semibold hover:text-primary dark:hover:text-primary transition-colors">
                    Já tenho uma conta
                </button>
</div>
</div>
<!-- Decorative elements -->
<div class="h-2 bg-primary w-1/3 mx-auto rounded-full mb-2 opacity-20"></div>
</div>
</body></html>
