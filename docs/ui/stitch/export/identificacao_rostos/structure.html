<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#13ae20",
                "background-light": "#f6f8f6",
                "background-dark": "#112112",
              },
              fontFamily: {
                "display": ["Manrope", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
      </script>
<title>Rootline - Identificar Família</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between p-4 bg-background-light dark:bg-background-dark border-b border-primary/10">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</button>
<h1 class="text-lg font-bold tracking-tight">Identificar Família</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-1 flex flex-col max-w-md mx-auto w-full p-6 gap-8">
<!-- Progress Indicator -->
<div class="space-y-3">
<div class="flex justify-between items-end">
<p class="text-sm font-medium text-slate-600 dark:text-slate-400">Progresso da IA</p>
<p class="text-sm font-bold text-primary">12 de 20 rostos identificados</p>
</div>
<div class="w-full bg-primary/20 h-2.5 rounded-full overflow-hidden">
<div class="bg-primary h-full rounded-full transition-all duration-500" style="width: 60%;"></div>
</div>
</div>
<!-- Hero Section: Face Portrait -->
<div class="flex flex-col items-center gap-6 py-4">
<div class="relative group">
<div class="absolute -inset-1 bg-primary/20 rounded-full blur group-hover:blur-md transition-all"></div>
<div class="relative w-48 h-48 rounded-full border-4 border-white dark:border-slate-800 shadow-xl overflow-hidden bg-slate-200 dark:bg-slate-700">
<img alt="Face detection target" class="w-full h-full object-cover" data-alt="Close up portrait of a smiling woman" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCJGZ4VSv9yhG90MkfeI0aqawsHtdEhHOzQljLLc8tK8oZa0YXgNAqxsL0YeG6or4FsWIa8wy7MDrxjW9EpleJbV25D2AbJv2wZwfeqHpWRW1laG4MxVIqFTF5h-u__vRx4qpeN1V9_FcRz5mhUphYO6jyI-hBa38VsHzsSpDIgjkMWklygTUMWxR3U6PX6hsuYAPbKo10lHtnI-PYmj-kbQzCBt6LveTZi8rverHhvhGzryn4maLGWqYd85OpuA16GM1HwlhAULCE"/>
</div>
<div class="absolute bottom-2 right-2 bg-primary text-white p-2 rounded-full shadow-lg flex items-center justify-center">
<span class="material-symbols-outlined text-sm">auto_awesome</span>
</div>
</div>
<div class="text-center space-y-1">
<h2 class="text-2xl font-extrabold text-slate-900 dark:text-slate-100">Quem é este?</h2>
<p class="text-slate-600 dark:text-slate-400">A IA encontrou este rosto nas suas fotos antigas</p>
</div>
</div>
<!-- Suggestion Section -->
<div class="space-y-4">
<p class="text-xs font-bold uppercase tracking-widest text-primary text-center">Sugestões da sua árvore</p>
<div class="grid grid-cols-3 gap-3">
<button class="flex flex-col items-center gap-2 p-3 rounded-xl border-2 border-primary bg-primary/5 hover:bg-primary/10 transition-all">
<div class="w-12 h-12 rounded-full bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">person</span>
</div>
<span class="text-sm font-semibold truncate w-full text-center">Vovó Linda</span>
</button>
<button class="flex flex-col items-center gap-2 p-3 rounded-xl border-2 border-transparent bg-white dark:bg-slate-800 hover:border-primary/30 transition-all shadow-sm">
<div class="w-12 h-12 rounded-full bg-slate-100 dark:bg-slate-700 flex items-center justify-center text-slate-500">
<span class="material-symbols-outlined">person</span>
</div>
<span class="text-sm font-medium truncate w-full text-center">Sara</span>
</button>
<button class="flex flex-col items-center gap-2 p-3 rounded-xl border-2 border-transparent bg-white dark:bg-slate-800 hover:border-primary/30 transition-all shadow-sm">
<div class="w-12 h-12 rounded-full bg-slate-100 dark:bg-slate-700 flex items-center justify-center text-slate-500">
<span class="material-symbols-outlined">person</span>
</div>
<span class="text-sm font-medium truncate w-full text-center">Você</span>
</button>
</div>
</div>
<!-- Action Buttons -->
<div class="mt-auto space-y-3 pb-6">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-2 transition-transform active:scale-[0.98]">
<span class="material-symbols-outlined">check_circle</span>
                Sim, é esta pessoa
            </button>
<button class="w-full bg-white dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200 font-bold py-4 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">help</span>
                Não, é outra pessoa
            </button>
<button class="w-full text-slate-400 dark:text-slate-500 text-sm font-medium py-2 hover:text-primary transition-colors">
                Pular por enquanto
            </button>
</div>
</main>
<!-- Bottom Decorative Bar -->
<footer class="p-4 text-center">
<p class="text-xs text-slate-400 dark:text-slate-500">Rootline utiliza IA para organizar suas memórias familiares.</p>
</footer>
</body></html>
