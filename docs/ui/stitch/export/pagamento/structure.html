<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Rootline - Finalizar Pedido</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ae20",
                        "background-light": "#f6f8f6",
                        "background-dark": "#112112",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<!-- Top Navigation -->
<header class="sticky top-0 z-50 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-primary/10">
<div class="max-w-md mx-auto flex items-center justify-between p-4">
<button class="text-slate-900 dark:text-slate-100 p-2 hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-lg font-bold tracking-tight">Finalizar Pedido</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
<!-- Progress Stepper -->
<div class="flex w-full flex-row items-center justify-center gap-3 py-3">
<div class="h-2 w-2 rounded-full bg-primary/30"></div>
<div class="h-2 w-2 rounded-full bg-primary/30"></div>
<div class="h-2 w-8 rounded-full bg-primary"></div>
</div>
</header>
<main class="max-w-md mx-auto pb-32">
<!-- Delivery Address Section -->
<section class="p-4 space-y-3">
<div class="flex items-center justify-between">
<h2 class="text-lg font-bold">Endereço de Entrega</h2>
</div>
<div class="bg-white dark:bg-slate-800/50 p-4 rounded-xl border border-primary/10 flex items-start gap-4 shadow-sm">
<div class="bg-primary/10 p-3 rounded-lg text-primary">
<span class="material-symbols-outlined">location_on</span>
</div>
<div class="flex-1">
<p class="font-bold text-base">Rua das Flores, 123</p>
<p class="text-slate-500 dark:text-slate-400 text-sm">Bairro Jardim, São Paulo - SP</p>
<p class="text-slate-500 dark:text-slate-400 text-sm">CEP: 01234-567</p>
</div>
<button class="text-primary font-bold text-sm hover:bg-primary/5 px-2 py-1 rounded">
                    Alterar
                </button>
</div>
</section>
<!-- Shipping Method Section -->
<section class="p-4 space-y-3">
<h2 class="text-lg font-bold">Método de Envio</h2>
<div class="space-y-3">
<label class="relative flex items-center bg-white dark:bg-slate-800/50 p-4 rounded-xl border-2 border-primary cursor-pointer">
<input checked="" class="hidden" name="shipping" type="radio"/>
<div class="flex-1">
<p class="font-bold">Padrão Rootline</p>
<p class="text-sm text-slate-500 dark:text-slate-400">3-5 dias úteis</p>
</div>
<div class="text-right">
<p class="font-bold text-primary">R$ 12,90</p>
<span class="material-symbols-outlined text-primary">check_circle</span>
</div>
</label>
<label class="relative flex items-center bg-white dark:bg-slate-800/50 p-4 rounded-xl border border-primary/10 cursor-pointer hover:border-primary/40 transition-all">
<input class="hidden" name="shipping" type="radio"/>
<div class="flex-1">
<p class="font-bold">Expresso</p>
<p class="text-sm text-slate-500 dark:text-slate-400">1-2 dias úteis</p>
</div>
<div class="text-right">
<p class="font-bold">R$ 24,90</p>
</div>
</label>
</div>
</section>
<!-- Payment Method Section -->
<section class="p-4 space-y-3">
<h2 class="text-lg font-bold">Forma de Pagamento</h2>
<div class="grid grid-cols-2 gap-3">
<button class="flex flex-col items-center justify-center p-4 bg-white dark:bg-slate-800/50 rounded-xl border-2 border-primary text-primary font-bold gap-2">
<span class="material-symbols-outlined text-3xl">credit_card</span>
<span>Cartão</span>
</button>
<button class="flex flex-col items-center justify-center p-4 bg-white dark:bg-slate-800/50 rounded-xl border border-primary/10 text-slate-600 dark:text-slate-300 font-bold gap-2 hover:border-primary/40">
<span class="material-symbols-outlined text-3xl">qr_code_2</span>
<span>Pix</span>
</button>
</div>
<!-- Card Form Placeholder -->
<div class="mt-4 bg-white dark:bg-slate-800/50 p-4 rounded-xl border border-primary/10 space-y-4">
<div class="space-y-1">
<label class="text-xs font-bold uppercase text-slate-500">Número do Cartão</label>
<div class="flex items-center gap-2 border-b border-slate-200 dark:border-slate-700 py-2">
<span class="material-symbols-outlined text-slate-400">payments</span>
<input class="bg-transparent border-none p-0 focus:ring-0 w-full" placeholder="0000 0000 0000 0000" type="text"/>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1">
<label class="text-xs font-bold uppercase text-slate-500">Validade</label>
<input class="bg-transparent border-b border-slate-200 dark:border-slate-700 py-2 focus:ring-0 w-full focus:border-primary" placeholder="MM/AA" type="text"/>
</div>
<div class="space-y-1">
<label class="text-xs font-bold uppercase text-slate-500">CVV</label>
<input class="bg-transparent border-b border-slate-200 dark:border-slate-700 py-2 focus:ring-0 w-full focus:border-primary" placeholder="123" type="text"/>
</div>
</div>
</div>
</section>
<!-- Order Summary -->
<section class="p-4 space-y-3">
<h2 class="text-lg font-bold">Resumo do Pedido</h2>
<div class="bg-white dark:bg-slate-800/50 p-4 rounded-xl border border-primary/10 space-y-2">
<div class="flex justify-between text-slate-600 dark:text-slate-400">
<span>Subtotal</span>
<span>R$ 158,00</span>
</div>
<div class="flex justify-between text-slate-600 dark:text-slate-400">
<span>Frete</span>
<span class="text-primary">R$ 12,90</span>
</div>
<div class="pt-2 mt-2 border-t border-slate-100 dark:border-slate-700 flex justify-between text-xl font-bold">
<span>Total</span>
<span class="text-primary">R$ 170,90</span>
</div>
</div>
</section>
<!-- Trust Badge -->
<div class="flex items-center justify-center gap-2 py-4 text-slate-400">
<span class="material-symbols-outlined text-sm">lock</span>
<span class="text-xs font-medium">Ambiente de Pagamento Seguro</span>
</div>
</main>
<!-- Sticky Bottom CTA -->
<div class="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-background-dark/90 backdrop-blur-lg border-t border-primary/10 p-4 z-50">
<div class="max-w-md mx-auto">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
<span>Finalizar Compra</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
</body></html>
